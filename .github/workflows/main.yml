name: generate animation

on:
  # 每 24 小时自动运行一次
  schedule:
    - cron: "0 */24 * * *" 

  # 支持手动触发
  workflow_dispatch:

  # 当 main 分支有 push 时运行
  push:
    branches:
    - main

jobs:
  generate-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # 1. 生成贪吃蛇 SVG 动画
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff00ff&color_dots=#ebedf0,#f5d0fe,#d8b4fe,#a855f7,#7e22ce
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ff00ff&color_dots=#161b22,#4c1d95,#6d28d9,#7c3aed,#a855f7

      # 2. 将生成的图片推送到 'output' 分支
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}